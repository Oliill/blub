<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
    function soucet()
    {
        let pocetCisel = prompt("Zadej počet čísel, které budeš chtít zadávat:")*1;
        let soucet = 0;
        for(let i = 0; i < pocetCisel; i++)
        {
            let cisloOdUzivatele = prompt("Zadejte číslo:")*1;
            soucet = soucet + cisloOdUzivatele;
        }
        alert("Součet je: "+soucet);
    }
    </script>
</head>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyklus - vypis cisel</title>
    <script>
        function vypisCisla()
        {
            let vystup = document.getElementById("odstavec");

            for(let i = 1; i <= 10; i++)
            {
               vystup.innerHTML += i;
               if(i != 10)
                {
                    vystup.innerHTML += ", ";
                } 
            }
        }
    </script>
</head>
<body onLoad="vypisCisla()">
    <p id="odstavec"></p>
    
</body>
</html>

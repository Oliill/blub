<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přidání HTML pomocí JS</title>
    <script>
        function vytvorHTMLPrkvy()
        {
            let rodicovskyObjekt = document.getElementById("stranka");
            //Vytváříme nový HTML prvek:
            let potomek = document.createElement("div");
            potomek.style = "background-color: #00FF00; width: 50px; height: 50px; position:absolute; left: 100px; top: 50px";
            //Daný prvek přidáme na stránku - rodičovským objektem bude rodicivskyObjekt (tzn body)
            rodicovskyObjekt.appendChild(potomek);
        }
        
        function vytvorHTMLPrkvy2()
        {
            let rodicovskyObjekt = document.getElementById("stranka");
            //vezmeme šířku stránky, odečteme levé a pravé odsazení (100) a poté šířku jednoho čtverce (50)
            let pocetCtverecku = (rodicovskyObjekt.clientWidth - 100 - 100 - 50)/60;
            for(let i = 0; i < Math.round(pocetCtverecku); i++)
            {
                //Vytváříme nový HTML prvek:
                let potomek = document.createElement("div");
                let souradniceX = 60*i + 100;
                potomek.style = "background-color: #00FF00; width: 50px; height: 50px; position:absolute; left: "+souradniceX+"px; top: 50px";
                //Daný prvek přidáme na stránku - rodičovským objektem bude rodicivskyObjekt (tzn body)
                rodicovskyObjekt.appendChild(potomek);
            }

        }

        function vytvorHTMLPrkvy3()
        {
            let rodicovskyObjekt = document.getElementById("stranka"); 
            let stredStrankyX = Math.round(rodicovskyObjekt.clientWidth/2);
            let stredStrankyY = Math.round(window.innerHeight/2);   
            let polomerKruznice = 250;    
            for(let i = 0; i < 15; i++)
            {
                //Vytváříme nový HTML prvek:
                let potomek = document.createElement("div");
                // vypočítáme pomocí polárních souřadnic souřadnice bodu na kružnici
                // stačí si uvědomit, jak vyjádřit polohu bodu na jednotkové kružnici pomocí
                // sin(x) a cos(x) (pokud kružnice nebude jednotková, stačí souřadnici
                // přenásobit koeficientem; pokud kružnice nemá střed v počátku SS, pak
                // ji posuneme přičtením souřadnic bodu, ve kterém má mít střed)
                let souradniceX = stredStrankyX + polomerKruznice*Math.cos((2*Math.PI/15)*i);
                let souradniceY = stredStrankyY + polomerKruznice*Math.sin((2*Math.PI/15)*i);;
                potomek.style = "background-color: #00FF00; width: 50px; height: 50px; position:absolute; left: "+souradniceX+"px; top:"+souradniceY+"px";
                //Daný prvek přidáme na stránku - rodičovským objektem bude rodicivskyObjekt (tzn body)
                rodicovskyObjekt.appendChild(potomek);
            }

        }
    </script>
</head>
<body id="stranka" onload="vytvorHTMLPrkvy3()">
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function zjistiPocetPlechovek()
        {
            let prvniRada = Number(document.getElementById("vstupOdUzivatele").value);
            //alert(n);
            let plechovekCelkem = 0;
            for(let rada = 1; rada <= prvniRada; rada++)
            {
                // plechovekCelkem = plechovekCelkemn + rada;
                plechovekCelkem += rada;
            }
            alert(plechovekCelkem);
        }

        function zjistiPocetPlechovekLepe()
        {
            let prvniRada = Number(document.getElementById("vstupOdUzivatele").value);
            //alert(n);
            let plechovekCelkem = (prvniRada/2)*(prvniRada+1);
            alert(plechovekCelkem);
        }
        </script>
</head>
<body>
    <form>
        <input type="number" id="vstupOdUzivatele">
        <input type="button" value="Počítej!" onclick="zjistiPocetPlechovekLepe()">    
    </form>
</body>
</html>
